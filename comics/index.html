<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>KASHIN MANGA | KasCAP</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="./comics.css">

  <link rel="icon" type="image/png" href="../favicon.png">
</head>

<body>

  <main class="comics-page">

    <header class="comics-header">

      <a href="../index.html" class="back-link">
        Back
      </a>

      <h1 class="comics-title">
        KASHIN MANGA
      </h1>

    </header>

    <section class="chapter-list">

      <!-- Chapter 1 -->

      <div class="chapter-row">

        <div class="chapter-left">
          <h2>Chapter 1</h2>
        </div>

        <div class="chapter-buttons">

          <a
            class="comic-btn"
            href="./viewer.html?chapter=1&lang=jp">
            JP
          </a>

          <a
            class="comic-btn"
            href="./viewer.html?chapter=1&lang=en">
            EN
          </a>

        </div>

      </div>

      <!-- Chapter 2 -->

      <div class="chapter-row">

        <div class="chapter-left">
          <h2>Chapter 2</h2>
        </div>

        <div class="chapter-buttons">

          <button
            type="button"
            class="comic-btn chapter2-btn"
            data-chapter="2"
            data-lang="jp"
            data-required="1">
            JP
          </button>

          <button
            type="button"
            class="comic-btn chapter2-btn"
            data-chapter="2"
            data-lang="en"
            data-required="1">
            EN
          </button>

          <span class="lock-icon">
            🔒
          </span>

        </div>

      </div>

      <!-- Chapter 3 -->

      <div class="chapter-row">

        <div class="chapter-left">
          <h2>Chapter 3</h2>
          <p class="coming-soon">
            COMING SOON
          </p>
        </div>

        <div class="chapter-buttons">

          <button class="comic-btn disabled">
            JP
          </button>

          <button class="comic-btn disabled">
            EN
          </button>

          <span class="lock-icon">
            🔒
          </span>

        </div>

      </div>

    </section>

  </main>

  <!-- Chapter 2 Holder Gate Modal -->
  <div id="chapterGateModal" class="gate-modal" aria-hidden="true">
    <div class="gate-panel" role="dialog" aria-modal="true" aria-labelledby="gateTitle">

      <button id="gateCloseBtn" class="gate-close" type="button" aria-label="Close">
        ×
      </button>

      <div class="gate-inner">

        <h2 id="gateTitle" class="gate-title">
          Chapter 2
        </h2>

        <p class="gate-subtitle">
          🔒 HOLDER ONLY
        </p>

        <p class="gate-description">
          To read Chapter 2,<br>
          you must hold at least one KASHIN NFT.
        </p>

        <button id="connectWalletBtn" class="gate-connect" type="button">
          CONNECT WALLET
        </button>

        <p id="gateStatus" class="gate-status">
          Connect your wallet to verify your KASHIN holdings.
        </p>

      </div>

    </div>
  </div>

  <script src="./comics-gate.js"></script>
</body>

</html>
