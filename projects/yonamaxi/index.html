<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YONAMAXI</title>

  <link rel="stylesheet" href="../../style.css">

  <style>
    .detail-wrap { position: relative; z-index: 2; max-width: 1180px; margin: 0 auto 90px; }

    .detail-top {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 42px 0 26px;
    }

    .back-link,
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(180,255,244,0.18);
      background: linear-gradient(180deg, rgba(116,198,186,0.18) 0%, rgba(116,198,186,0.42) 45%, rgba(116,198,186,0.82) 100%);
      color: white;
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(0,0,0,0.20);
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .back-link {
      justify-self: start;
      padding: 0 20px;
      letter-spacing: 0.05em;
    }

    .back-link:hover,
    .icon-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(116,198,186,0.55);
      background: linear-gradient(180deg, rgba(116,198,186,0.28) 0%, rgba(116,198,186,0.58) 45%, rgba(116,198,186,0.96) 100%);
      box-shadow: 0 12px 28px rgba(0,0,0,0.26), 0 0 18px rgba(116,198,186,0.18);
    }

    .detail-title {
      justify-self: center;
      font-family: "Gamer", sans-serif;
      font-size: 96px;
      line-height: 0.9;
      color: white;
    }

    .top-links {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn {
      width: 52px;
      height: 42px;
      padding: 0;
    }

    .icon-btn img {
      width: 120%;
      height: 120%;
      object-fit: contain;
      display: block;
    }

    .official-text {
      max-width: 980px;
      margin: 0 auto 34px;
      color: #d7d7e6;
      font-size: 16px;
      line-height: 1.9;
      letter-spacing: 0.02em;
      text-align: center;
    }

    .collection-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 22px;
      align-items: start;
    }

    .filter-panel,
    .nft-panel {
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.10);
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.025));
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.28);
    }

    .filter-panel {
      position: sticky;
      top: 20px;
      padding: 22px;
      max-height: calc(100vh - 40px);
      overflow: auto;
    }

    .filter-title {
      font-family: "Gamer", sans-serif;
      font-size: 48px;
      line-height: 0.9;
      margin-bottom: 18px;
    }

    .result-count {
      color: rgba(255,255,255,0.58);
      font-size: 13px;
      margin-bottom: 16px;
    }

    details {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 12px 0;
    }

    summary {
      cursor: pointer;
      color: white;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      list-style: none;
    }

    .filter-options {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .filter-option {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #c0c0cf;
      font-size: 13px;
    }

    .filter-option input { accent-color: #74c6ba; }

    .nft-panel { padding: 22px; }

    .nft-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .nft-card {
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.045);
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .nft-card:hover {
      transform: translateY(-4px);
      border-color: rgba(116,198,186,0.55);
      box-shadow: 0 0 24px rgba(116,198,186,0.10);
    }

    .nft-card img {
      width: 100%;
      display: block;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    .nft-card p {
      padding: 10px;
      color: white;
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(10px);
    }

    .modal.is-visible { display: flex; }

    .modal-card {
      position: relative;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 28px;
      width: min(920px, 100%);
      padding: 28px;
      border-radius: 28px;
      border: 1px solid rgba(116,198,186,0.28);
      background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.035));
      box-shadow: 0 30px 90px rgba(0,0,0,0.55), 0 0 40px rgba(116,198,186,0.10);
    }

    .modal-close {
      position: absolute;
      right: 18px;
      top: 18px;
      width: 42px;
      height: 38px;
      border: 1px solid rgba(180,255,244,0.18);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(116,198,186,0.18) 0%, rgba(116,198,186,0.42) 45%, rgba(116,198,186,0.82) 100%);
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    .modal-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 22px;
      object-fit: cover;
    }

    .modal-info h2 {
      font-family: "Gamer", sans-serif;
      font-size: 64px;
      line-height: 0.9;
      margin-bottom: 18px;
      padding-right: 48px;
    }

    .modal-info p {
      color: #c0c0cf;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .trait-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 16px;
    }

    .trait {
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .trait span {
      display: block;
      color: rgba(255,255,255,0.45);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .trait strong {
      display: block;
      color: white;
      font-size: 14px;
      margin-top: 3px;
    }

    @media (max-width: 767px) {
      .detail-top {
        grid-template-columns: 1fr;
        gap: 18px;
        text-align: center;
        padding: 26px 0 20px;
      }

      .back-link,
      .top-links,
      .detail-title { justify-self: center; }

      .detail-title { font-size: 58px; }

      .official-text {
        text-align: left;
        font-size: 14px;
        line-height: 1.8;
      }

      .collection-layout { grid-template-columns: 1fr; }

      .filter-panel {
        position: relative;
        top: auto;
        max-height: none;
      }

      .nft-grid { grid-template-columns: repeat(2, 1fr); }

      .modal-card {
        grid-template-columns: 1fr;
        padding: 22px;
      }

      .modal-info h2 { font-size: 48px; }

      .trait-list { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <div class="detail-wrap">

    <div class="detail-top">

      <a href="../../index.html" class="back-link">Back</a>

      <h1 class="detail-title">YONAMAXI</h1>

   <div class="top-links">

  <a href="https://kaspa.com/nft/collections/YONAMAXI" target="_blank" class="icon-btn" aria-label="KaspaCom">

    <img src="../../assets/link/kaspacom.png" alt="KaspaCom">

  </a>

  <a href="https://t.me/kapunkscommunity/27911" target="_blank" class="icon-btn" aria-label="Telegram">

    <img src="../../assets/link/telegram.png" alt="Telegram">

  </a>

</div>

    <p class="official-text">
      YonaMaxi is a special limited-edition NFT collaboration of 250 pieces, created by the joint team of YONATOSHI and KasCAP.
    </p>

    <section class="collection-layout">

      <aside class="filter-panel">
        <h2 class="filter-title">FILTER</h2>
        <p id="resultCount" class="result-count">Loading metadata...</p>
        <div id="filters"></div>
      </aside>

      <section class="nft-panel">
        <div id="nftGrid" class="nft-grid"></div>
      </section>

    </section>

  </div>

  <div id="nftModal" class="modal">
    <div class="modal-card">
      <button id="modalClose" class="modal-close">×</button>

      <img id="modalImage" class="modal-image" src="" alt="YonaMaxi NFT">

      <div class="modal-info">
        <h2 id="modalName">YONAMAXI</h2>
        <p id="modalDescription"></p>
        <div id="modalTraits" class="trait-list"></div>
      </div>
    </div>
  </div>

  <script>
    const IMAGE_CID = "bafybeib6mscors2ckg5roz5bs3et3ebjnvwpvuf2eors2j6jsoeipicst4";
    const METADATA_CID = "bafybeifxmoqrza4cybkmalknqpouy5vu4x3nm3vzuhikskwzli2vo4ewpe";

    const GATEWAY = "https://ipfs.io/ipfs/";
    const TOTAL_SUPPLY = 250;

    const nftGrid = document.getElementById("nftGrid");
    const filtersEl = document.getElementById("filters");
    const resultCount = document.getElementById("resultCount");

    const nftModal = document.getElementById("nftModal");
    const modalClose = document.getElementById("modalClose");
    const modalImage = document.getElementById("modalImage");
    const modalName = document.getElementById("modalName");
    const modalDescription = document.getElementById("modalDescription");
    const modalTraits = document.getElementById("modalTraits");

    let allNFTs = [];
    let selectedFilters = {};
    let FILTER_KEYS = [];

    function imageUrl(id) {
      return `${GATEWAY}${IMAGE_CID}/${id}.png`;
    }

    function metadataUrl(id) {
      return `${GATEWAY}${METADATA_CID}/${id}.json`;
    }

    function getAttribute(metadata, key) {
      if (!metadata || !Array.isArray(metadata.attributes)) return "";

      const found = metadata.attributes.find((attr) => {
        return String(attr.trait_type || "").toLowerCase() === key.toLowerCase();
      });

      return found ? String(found.value) : "";
    }

    async function loadMetadata(id) {
      try {
        const response = await fetch(metadataUrl(id));
        if (!response.ok) throw new Error("not found");

        const metadata = await response.json();

        return {
          id,
          name: metadata.name || `YONAMAXI #${id}`,
          description: metadata.description || "",
          attributes: metadata.attributes || []
        };
      } catch (error) {
        return {
          id,
          name: `YONAMAXI #${id}`,
          description: "",
          attributes: []
        };
      }
    }

    async function loadAllNFTs() {
      const ids = Array.from({ length: TOTAL_SUPPLY }, (_, i) => i + 1);
      const batchSize = 50;
      const results = [];

      for (let i = 0; i < ids.length; i += batchSize) {
        const batch = ids.slice(i, i + batchSize);
        const batchResults = await Promise.all(batch.map(loadMetadata));

        results.push(...batchResults);
        resultCount.textContent = `Loading metadata... ${results.length} / ${TOTAL_SUPPLY}`;
      }

      allNFTs = results;

      buildDynamicFilterKeys();

      allNFTs = allNFTs.map((nft) => {
        FILTER_KEYS.forEach((key) => {
          nft[key] = getAttribute(nft, key);
        });

        return nft;
      });

      buildFilters();
      renderNFTs(allNFTs);
    }

    function buildDynamicFilterKeys() {
      const keys = new Set();

      allNFTs.forEach((nft) => {
        if (!Array.isArray(nft.attributes)) return;

        nft.attributes.forEach((attr) => {
          if (attr.trait_type) {
            keys.add(String(attr.trait_type));
          }
        });
      });

      FILTER_KEYS = [...keys];
    }

    function buildFilters() {
      filtersEl.innerHTML = "";

      FILTER_KEYS.forEach((key) => {
        const values = [...new Set(
          allNFTs
            .map((nft) => nft[key])
            .filter((value) => value && value.trim() !== "")
        )].sort();

        selectedFilters[key] = new Set();

        const details = document.createElement("details");
        details.open = false;

        const summary = document.createElement("summary");
        summary.textContent = key;

        const options = document.createElement("div");
        options.className = "filter-options";

        values.forEach((value) => {
          const label = document.createElement("label");
          label.className = "filter-option";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.value = value;

          checkbox.addEventListener("change", () => {
            if (checkbox.checked) {
              selectedFilters[key].add(value);
            } else {
              selectedFilters[key].delete(value);
            }

            applyFilters();
          });

          label.appendChild(checkbox);
          label.appendChild(document.createTextNode(value));
          options.appendChild(label);
        });

        details.appendChild(summary);
        details.appendChild(options);
        filtersEl.appendChild(details);
      });
    }

    function applyFilters() {
      const filtered = allNFTs.filter((nft) => {
        return FILTER_KEYS.every((key) => {
          if (selectedFilters[key].size === 0) return true;
          return selectedFilters[key].has(nft[key]);
        });
      });

      renderNFTs(filtered);
    }

    function renderNFTs(items) {
      nftGrid.innerHTML = "";

      resultCount.textContent = `${items.length} / ${TOTAL_SUPPLY} NFTs`;

      items.forEach((nft) => {
        const card = document.createElement("article");
        card.className = "nft-card";

        card.innerHTML = `
          <img src="${imageUrl(nft.id)}" alt="${nft.name}" loading="lazy">
          <p>${nft.name}</p>
        `;

        card.addEventListener("click", () => {
          openNFTModal(nft);
        });

        nftGrid.appendChild(card);
      });
    }

    function openNFTModal(nft) {
      modalImage.src = imageUrl(nft.id);
      modalName.textContent = nft.name || `YONAMAXI #${nft.id}`;
      modalDescription.textContent = nft.description || "";

      modalTraits.innerHTML = "";

      nft.attributes.forEach((item) => {
        const trait = document.createElement("div");
        trait.className = "trait";

        trait.innerHTML = `
          <span>${item.trait_type || "Trait"}</span>
          <strong>${item.value || "-"}</strong>
        `;

        modalTraits.appendChild(trait);
      });

      nftModal.classList.add("is-visible");
    }

    function closeNFTModal() {
      nftModal.classList.remove("is-visible");
    }

    modalClose.addEventListener("click", closeNFTModal);

    nftModal.addEventListener("click", (event) => {
      if (event.target === nftModal) {
        closeNFTModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeNFTModal();
      }
    });

    loadAllNFTs();
  </script>

</body>

</html>
