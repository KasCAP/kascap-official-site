  <script>
    const IMAGE_CID = "bafybeib6mscors2ckg5roz5bs3et3ebjnvwpvuf2eors2j6jsoeipicst4";
    const METADATA_CID = "bafybeifxmoqrza4cybkmalknqpouy5vu4x3nm3vzuhikskwzli2vo4ewpe";

    const TOTAL_SUPPLY = 250;
    const ITEMS_PER_LOAD = 100;

    const FILTER_KEYS = [
      "type",
      "head",
      "eyes",
      "mouth",
      "acc1",
      "acc2"
    ];

    const nftGrid = document.getElementById("nftGrid");
    const filtersEl = document.getElementById("filters");
    const resultCount = document.getElementById("resultCount");
    const mobileCount = document.getElementById("mobileCount");
    const loadMoreBtn = document.getElementById("loadMoreBtn");

    const filterPanel = document.getElementById("filterPanel");
    const filterToggle = document.getElementById("filterToggle");
    const drawerClose = document.getElementById("drawerClose");
    const drawerBackdrop = document.getElementById("drawerBackdrop");
    const clearFiltersBtn = document.getElementById("clearFiltersBtn");

    const nftModal = document.getElementById("nftModal");
    const modalClose = document.getElementById("modalClose");
    const modalImage = document.getElementById("modalImage");
    const modalName = document.getElementById("modalName");
    const modalDescription = document.getElementById("modalDescription");
    const modalTraits = document.getElementById("modalTraits");

    let allNFTs = [];
    let currentItems = [];
    let visibleCount = ITEMS_PER_LOAD;
    let selectedFilters = {};

    function imageCandidates(id) {
      const padded = String(id).padStart(4, "0");

      return [
        `https://${IMAGE_CID}.ipfs.inbrowser.link/${id}.png`,
        `https://ipfs.io/ipfs/${IMAGE_CID}/${id}.png`,
        `https://gateway.pinata.cloud/ipfs/${IMAGE_CID}/${id}.png`,
        `https://${IMAGE_CID}.ipfs.inbrowser.link/${padded}.png`,
        `https://ipfs.io/ipfs/${IMAGE_CID}/${padded}.png`,
        `https://gateway.pinata.cloud/ipfs/${IMAGE_CID}/${padded}.png`,
        `https://${IMAGE_CID}.ipfs.inbrowser.link/${id}.jpg`,
        `https://ipfs.io/ipfs/${IMAGE_CID}/${id}.jpg`,
        `https://gateway.pinata.cloud/ipfs/${IMAGE_CID}/${id}.jpg`,
        `https://${IMAGE_CID}.ipfs.inbrowser.link/${padded}.jpg`,
        `https://ipfs.io/ipfs/${IMAGE_CID}/${padded}.jpg`,
        `https://gateway.pinata.cloud/ipfs/${IMAGE_CID}/${padded}.jpg`
      ];
    }

    function metadataUrl(id) {
      return `https://ipfs.io/ipfs/${METADATA_CID}/${id}.json`;
    }

    function getAttribute(metadata, key) {
      if (!metadata || !Array.isArray(metadata.attributes)) return "";

      const found = metadata.attributes.find((attr) => {
        return String(attr.trait_type || "").toLowerCase() === key.toLowerCase();
      });

      return found ? String(found.value) : "";
    }

    async function loadMetadata(id) {
      try {
        const response = await fetch(metadataUrl(id));
        if (!response.ok) throw new Error("not found");

        const metadata = await response.json();

        const nft = {
          id,
          name: metadata.name || `YONAMAXI #${id}`,
          description: metadata.description || "",
          attributes: metadata.attributes || []
        };

        FILTER_KEYS.forEach((key) => {
          nft[key] = getAttribute(metadata, key);
        });

        return nft;
      } catch (error) {
        return {
          id,
          name: `YONAMAXI #${id}`,
          description: "",
          attributes: [],
          Rarity: "",
          Cycle: "",
          Group: "",
          Role: "",
          Mask: ""
        };
      }
    }

    async function loadAllNFTs() {
      const ids = Array.from({ length: TOTAL_SUPPLY }, (_, i) => i + 1);
      const batchSize = 50;
      const results = [];

      for (let i = 0; i < ids.length; i += batchSize) {
        const batch = ids.slice(i, i + batchSize);
        const batchResults = await Promise.all(batch.map(loadMetadata));

        results.push(...batchResults);
        resultCount.textContent = `Loading metadata... ${results.length} / ${TOTAL_SUPPLY}`;
        mobileCount.textContent = `Loading... ${results.length}`;
      }

      allNFTs = results;
      currentItems = allNFTs;

      buildFilters();
      renderNFTs();
      updateClearButton();
    }
function updateClearButton() {
  const hasActiveFilter = FILTER_KEYS.some((key) => {
    return selectedFilters[key] && selectedFilters[key].size > 0;
  });

  clearFiltersBtn.disabled = !hasActiveFilter;
}

    function buildFilters() {
      filtersEl.innerHTML = "";

      FILTER_KEYS.forEach((key) => {
        const values = [...new Set(
          allNFTs
            .map((nft) => nft[key])
            .filter((value) => value && value.trim() !== "")
        )].sort();

        selectedFilters[key] = new Set();

        const details = document.createElement("details");
        details.open = key === "Rarity";

        const summary = document.createElement("summary");
        summary.textContent = key;

        const options = document.createElement("div");
        options.className = "filter-options";

        values.forEach((value) => {
          const label = document.createElement("label");
          label.className = "filter-option";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.value = value;

          checkbox.addEventListener("change", () => {
            if (checkbox.checked) {
              selectedFilters[key].add(value);
            } else {
              selectedFilters[key].delete(value);
            }

            applyFilters();
          });

          label.appendChild(checkbox);
          label.appendChild(document.createTextNode(value));
          options.appendChild(label);
        });

        details.appendChild(summary);
        details.appendChild(options);
        filtersEl.appendChild(details);
      });
    }

    function applyFilters() {
  visibleCount = ITEMS_PER_LOAD;

  currentItems = allNFTs.filter((nft) => {
    return FILTER_KEYS.every((key) => {
      if (selectedFilters[key].size === 0) return true;
      return selectedFilters[key].has(nft[key]);
    });
  });

  renderNFTs();
  updateClearButton();
}

    function renderNFTs() {
      nftGrid.innerHTML = "";

      const visibleItems = currentItems.slice(0, visibleCount);

      resultCount.textContent = `${currentItems.length} / ${TOTAL_SUPPLY} NFTs`;
      mobileCount.textContent = `${currentItems.length} NFTs`;

      visibleItems.forEach((nft) => {
        const urls = imageCandidates(nft.id);
        const card = document.createElement("article");

        card.className = "nft-card";

        card.innerHTML = `
          <img
            src="${urls[0]}"
            alt="${nft.name}"
            loading="lazy"
            data-step="0"
          >
          <p>${nft.name}</p>
        `;

        const img = card.querySelector("img");

        img.onerror = () => {
          let step = Number(img.dataset.step);
          step++;

          if (step < urls.length) {
            img.dataset.step = step;
            img.src = urls[step];
          }
        };

        card.addEventListener("click", () => {
          openNFTModal(nft);
        });

        nftGrid.appendChild(card);
      });

      if (visibleCount >= currentItems.length) {
        loadMoreBtn.style.display = "none";
      } else {
        loadMoreBtn.style.display = "inline-flex";
      }
    }

    function openNFTModal(nft) {
      const urls = imageCandidates(nft.id);

      modalImage.dataset.step = "0";
      modalImage.src = urls[0];

      modalImage.onerror = () => {
        let step = Number(modalImage.dataset.step);
        step++;

        if (step < urls.length) {
          modalImage.dataset.step = step;
          modalImage.src = urls[step];
        }
      };

      modalName.textContent = nft.name || `YONAMAXI #${nft.id}`;
      modalDescription.textContent = nft.description || "";

      modalTraits.innerHTML = "";

      nft.attributes.forEach((item) => {
        const trait = document.createElement("div");
        trait.className = "trait";

        trait.innerHTML = `
          <span>${item.trait_type || "Trait"}</span>
          <strong>${item.value || "-"}</strong>
        `;

        modalTraits.appendChild(trait);
      });

      nftModal.classList.add("is-visible");
      document.body.style.overflow = "hidden";
    }

    function closeNFTModal() {
      nftModal.classList.remove("is-visible");
      document.body.style.overflow = "";
    }

    function openFilterDrawer() {
      filterPanel.classList.add("is-open");
      drawerBackdrop.classList.add("is-visible");
      document.body.style.overflow = "hidden";
    }

    function closeFilterDrawer() {
      filterPanel.classList.remove("is-open");
      drawerBackdrop.classList.remove("is-visible");
      document.body.style.overflow = "";
    }

    loadMoreBtn.addEventListener("click", () => {
      visibleCount += ITEMS_PER_LOAD;
      renderNFTs();
    });

    modalClose.addEventListener("click", closeNFTModal);

    nftModal.addEventListener("click", (event) => {
      if (event.target === nftModal) {
        closeNFTModal();
      }
    });

  filterToggle.addEventListener("click", openFilterDrawer);
drawerClose.addEventListener("click", closeFilterDrawer);
drawerBackdrop.addEventListener("click", closeFilterDrawer);

clearFiltersBtn.addEventListener("click", () => {
  FILTER_KEYS.forEach((key) => {
    selectedFilters[key].clear();
  });

  document
    .querySelectorAll('#filters input[type="checkbox"]')
    .forEach((checkbox) => {
      checkbox.checked = false;
    });

  visibleCount = ITEMS_PER_LOAD;
  currentItems = allNFTs;

  renderNFTs();
  updateClearButton();
});

document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") {
    closeNFTModal();
    closeFilterDrawer();
  }
});

    loadAllNFTs();
  </script>

</body>

</html>
